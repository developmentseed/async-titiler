services:
  api:
    build:
      context: .
    ports:
      - "8081:8081"
    environment:
      # AWS S3 endpoint config
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command: ["uvicorn", "async_titiler.main:app", "--host", "0.0.0.0", "--port", "8081", "--workers", "1"]

  benchmark:
    extends:
      service: api
    volumes:
      - ./.github/data:/data
